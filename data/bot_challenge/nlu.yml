version: "3.0"

nlu: 
  - intent: ask_bot_who_are_you
    examples: |
      - Who are you?
      - Are you a bot?
      - Are you a human?
      - Am I speaking to a bot?
      - Am I speaking to humans?
      - Are you real?

  - intent: ask_bot_gender
    examples: |
      - What is your sex?
      - Do you have a gender?
      - Are you a male?
      - Are you a female?
      - Are you a man?
      - Are you a woman?

  - intent: ask_bot_age
    examples: |
      - How old are you?
      - What is your age?

  - intent: ask_bot_location
    examples: |
      - Where do you live?
      - Where do you stay?
      - Where are you right now?

  - intent: ask_bot_if_remember_user_name
    examples: |
      - Who do you know?
      - Do you know who I am?
      - You know me?
      - Do you know me?
      - Do you still remember me?