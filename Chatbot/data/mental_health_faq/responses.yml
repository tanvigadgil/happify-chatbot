  utter_mental_health/find_the_right_therapy:
  - text: "Various types of therapy are more effective based on the nature of the condition and/or symptoms of mental health and people who experience it (for example, children will benefit from the therapist who specializes in children's mental health). However, there are several types of care and therapy that can help."

  utter_mental_health/learn_types_of_mental_health_treatment:
  - text: "Mental health conditions are often treated with treatment, therapy or combination of both. However, there are many types of treatments available including complementary & alternative treatments, self-help plans, and peer support. Personal care must be discussed by people with mental health and their team."

  utter_mental_health/diffrent_types_of_mental_health_professionals:
  - text: 'There are many types of mental health professionals. Finding the right for you might need some research.'

  utter_mental_health/find_support_group:
  - text: 'Many people consider peer support as a useful tool that can help their recovery. There are various organizations that offer support groups for consumers, family members and their friends. Some support groups are led by peers, while others may be led by a mental health professional.'

  utter_mental_health/find_inpatient_care:
  - text: 'If you or someone you know is in a crisis, hospitalization care can help. Inpatient care can help people stabilize new treatments, adjust to new symptoms, or get the help they need'

  utter_mental_health/find_other_local_services:
  - text: 'Many services can be used to help you find mental health care in your community, especially using the internet. This information can help you find the right therapist, and allow you to better understand the choice of proper treatment and treatment process.'

  utter_mental_health/learn_more_about_clinical_trials:
  - text: 'Sometimes, consumers of mental health services can consider participating in research studies when they do not experience improvement even though they have tried various treatments and care.Research Studies (also known as clinical trials) may involve the use of new drugs or new treatment approaches that security and effectiveness are being tested. Even though we support innovation in the field, consumers must be warned that there are risks associated with clinical trials, make sure you know it before registering.'