version: "3.0"

nlu:    
  - intent: greet
    examples: |
      - hi
      - hey
      - hello
      - how are you

  - intent: leave
    examples: |
      - bye
      - goodbye
      - see you again
      - until found

  - intent: initiate_bot_greet
    examples: |
      - initiate-bot-greet
      - initiate_bot_greet
      - initiate_bot_greet
      - initiate_bot-greet

  - intent: set_datepicker_dates
    examples: |
      - datepicker dates: [2021-1-11/2022-2-18](datepicker_dates)
      - datepicker_dates: [2021-1-12/2022-2-17](datepicker_dates)

  - intent: affirm_yes
    examples: |
      - affirm: yes
      - affirm_yes

  #emotions
  - intent: positive_feeling
    examples: |
      - I'm feeling happy
      - I'm happy again
      - My feeling is currently happy
      - I feel happy because
      - My condition is happy
      - I feel that I need to be a creative person
      - I don't feel that more anxiety isn't around me
      - I feel that I'm on the right track
      - I am happy because my plan is working according to my expectations
      - I am feeling grateful

  - intent: negative_feeling
    examples: |
      - I'm feeling sad
      - I am very sad
      - My feeling I experienced is scared
      - I am very angry because
      - I feel humiliated
      - I can change from feeling very desperate to be very full of hope just by being around someone who cares about me
      - I feel very annoyed
      - I feel annoyed lately don't know why
      - I feel that I am quite sad at all times
      - I feel very overwhelling

  - intent: write_gratitude_yes
    examples: |
      - write gratitude: yes
      - write_gratitude: yes

  - intent: write_gratitude_yes
    examples: |
      - write gratitude: no
      - write_gratitude: no

  - intent: share_thought_yes
    examples: |
      - share thought: yes
      - share_thought: yes

  - intent: share_thought_no
    examples: |
      - share thought: no
      - share_thought: no

  - intent: offer_other_method_yes
    examples: |
      - offer other method: yes
      - offer_other_method: yes

  - intent: offer_other_method_no
    examples: |
      - offer other method: no
      - offer_other_method: no

