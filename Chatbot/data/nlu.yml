  #suicide terms
  - intent: suicide_terms
    examples: |
      - Suicide
      - Want to commit suicide
      - Feeling unworthy in this world
      - Want to disappear from this world
      - Want to end my life
      - Can not stand life in this world
      - Want to hurt yourself
      - Want to stab yourself
      - Want to hang yourself
      
  - intent: suicide_terms_positive
    examples: |
      - Yes, I'm thinking about "things"
      - I really have a thought to do that

  - intent: suicide_terms_negative
    examples: |
      - No, I'm not thinking about "things"
      - I have no thought to do that

  - intent: suicide_terms_someone_else
    examples: |
      - other people plan to do "things"
      - Other people experience emergency situations
      - Other people in an emergency

  - intent: suicide_terms_unrecognized
    examples: |
      - I'm not saying that "thing"
      - I don't mention the "thing"
      - I don't talk about "things"
      - I don't lead at all "there"

  - intent: ensure_seek_help[crisis]_yes
    examples: |
      - make sure you contact them
      - Immediately contact them

  - intent: ensure_seek_help[crisis]_no
    examples: |
      - I don't want to contact them
      - I don't have to contact them